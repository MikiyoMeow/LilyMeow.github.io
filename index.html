<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>莉莉的个毛主页 🐾</title>
    <style>
        /* 1. 整体背景：温馨的猫咪粉色渐变 */
        body { 
            font-family: 'Segoe UI', 'PingFang SC', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: linear-gradient(135deg, #fff5f5 0%, #ffe3e3 100%); 
            color: #4a4a4a;
        }

        /* 2. 角色卡片容器 */
        .card { 
            background: white; 
            width: 350px; 
            padding: 2.5rem; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4); 
            text-align: center;
            border: 2px solid #ffb6c1;
        }

        /* 3. 头像样式 */
        .avatar { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 5px solid #ffb6c1; 
            object-fit: cover; 
            margin-bottom: 1rem;
        }

        h1 { font-size: 1.8rem; color: #ff6b81; margin: 0.5rem 0; }
        .tag { background: #ffb6c1; color: white; padding: 3px 12px; border-radius: 15px; font-size: 0.8rem; }

        /* 4. 技能列表区域 */
        .stats-container { text-align: left; margin-top: 2rem; }
        
        .stat-item { margin-bottom: 1.2rem; }
        
        .stat-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }

        /* 5. 进度条外框 */
        .bar-bg { 
            background: #eee; 
            height: 10px; 
            border-radius: 5px; 
            overflow: hidden; /* 确保内部条不会超出圆角 */
        }

        /* 6. 进度条内部（填充色） */
        .bar-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #ff9a9e 0%, #ff6b81 100%); 
            border-radius: 5px;
            transition: width 1s ease-in-out; /* 增加一点加载动画效果 */
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="LilySleeping.png" alt="LilySleeping" class="LilySleeping">
        
        <div><span class="tag">LV.3 特级拆家大師</span></div>
        <h1>莉莉 (Lily) 🐾</h1>
        
        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-info"><span>✨ 卖萌术</span><span>100%</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width: 100%;"></div></div>
            </div>

            <div class="stat-item">
                <div class="stat-info"><span>🪰 捕捉苍蝇</span><span>20%</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width: 20%;"></div></div>
            </div>

            <div class="stat-item">
                <div class="stat-info"><span>🏃 凌晨跑酷</span><span>85%</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width: 85%;"></div></div>
            </div>

            <div class="stat-item">
                <div class="stat-info"><span>🧠 听懂人话</span><span>0%</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width: 0%;"></div></div>
            </div>
        </div>
        
        <p style="font-size: 0.8rem; color: #999; margin-top: 20px;">* 以上属性随罐头摄入量动态变化</p>
    </div>

</body>
</html>
