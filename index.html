<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>莉莉的个猫主页 🐾</title>
    <style>
        /* ======================== 
           1. 基础布局与配色 (CSS)
           ======================== */
        body { 
            font-family: 'Segoe UI', 'PingFang SC', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
            background: linear-gradient(135deg, #fff5f5 0%, #ffe3e3 100%); 
            color: #4a4a4a;
            padding: 20px;
        }

        /* 统一卡片样式：加宽以适应左右布局 */
        .card { 
            background: white; 
            width: 850px; /* 加宽卡片 */
            max-width: 95vw;
            padding: 2.5rem; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4); 
            border: 2px solid #ffb6c1;
        }

        /* 左右分栏容器 (核心修改点) */
        .layout-container {
            display: flex;
            gap: 30px;
            align-items: stretch;
        }

        /* 左侧面板：占 3 份 */
        .left-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 2px dashed #ffe3e3; /* 中间的虚线分割线 */
            padding-right: 25px;
        }

        /* 右侧面板：占 7 份 */
        .right-panel {
            flex: 7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10px;
        }

        /* 头像与状态 */
        .avatar-container { position: relative; display: inline-block; margin-bottom: 10px; }
        .avatar { width: 130px; height: 130px; border-radius: 50%; border: 5px solid #ffb6c1; object-fit: cover; transition: all 0.5s ease; }
        
        /* 睡觉时的滤镜效果 */
        .sleeping { filter: grayscale(0.6) opacity(0.7); transform: scale(0.95) rotate(5deg); }
        .zzz { position: absolute; top: 0; right: 0; font-size: 1.5rem; color: #ff6b81; display: none; }
        .sleeping + .zzz { display: block; animation: zzz-fade 1.5s infinite; }

        @keyframes zzz-fade { 0%, 100% { opacity: 0; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-10px); } }

        h1 { font-size: 1.6rem; color: #ff6b81; margin: 10px 0 5px 0; text-align: center; }
        h2 { font-size: 1.3rem; color: #ff6b81; margin: 0 0 20px 0; border-bottom: 2px solid #fff0f2; padding-bottom: 10px; }

        /* ======================== 
           2. 养成状态条 (实时变化 - 右侧)
           ======================== */
        .live-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-item { background: #fffafb; padding: 12px; border-radius: 12px; border: 1px solid #fff0f2; box-shadow: 0 4px 6px rgba(255,182,193,0.1); }
        .stat-item small { font-weight: bold; font-size: 0.95rem; color: #666; }
        .stat-bar-bg { background: #eee; height: 10px; border-radius: 5px; margin-top: 8px; overflow: hidden; position: relative;}
        .stat-bar-fill { height: 100%; transition: width 0.5s ease-out; border-radius: 5px; }
        
        /* 不同状态条的颜色 */
        #bar-mood { background: linear-gradient(90deg, #ff9a9e, #ff6b81); }   
        #bar-hunger { background: linear-gradient(90deg, #f6d365, #fda085); } 
        #bar-energy { background: linear-gradient(90deg, #84fab0, #8fd3f4); } 
        #bar-clean { background: linear-gradient(90deg, #a1c4fd, #c2e9fb); }  

        /* 消息提示区 */
        #message { 
            background: #fff0f2; padding: 15px; border-radius: 15px; 
            color: #ff6b81; font-weight: bold; font-size: 1.05rem; 
            margin-bottom: 25px; text-align: center; border: 1px dashed #ffb6c1;
        }

        /* 互动按钮 */
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
        button { 
            padding: 12px 5px; border: none; border-radius: 15px; 
            background: #ffb6c1; color: white; cursor: pointer; 
            font-weight: bold; transition: all 0.2s; font-size: 0.95rem;
        }
        button:hover:not(:disabled) { background: #ff6b81; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(255,107,129,0.3); }
        button:disabled { background: #ddd; cursor: not-allowed; opacity: 0.7; transform: none; box-shadow: none; }
        #sleep-btn { background: #a1c4fd; } 
        #sleep-btn:hover:not(:disabled) { background: #4a90e2; }

        /* ======================== 
           3. RPG 核心战力面板 (固定属性 - 左侧)
           ======================== */
        .rpg-stats { width: 100%; margin-top: 20px; }
        .rpg-item { margin-bottom: 15px; }
        .rpg-info { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.85rem; margin-bottom: 6px; color: #777; }
        .rpg-bar-bg { background: #eee; height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid #e0e0e0; }
        .rpg-bar-fill { height: 100%; background: linear-gradient(90deg, #ff9a9e 0%, #ff6b81 100%); border-radius: 4px; }

        /* ======================== 
           4. 顶部导航菜单
           ======================== */
        .nav-menu {
            display: flex; justify-content: center; gap: 15px; 
            margin-bottom: 25px; padding-bottom: 20px; 
            border-bottom: 2px dashed #ffe3e3; width: 100%;
        }
        .nav-btn {
            text-decoration: none; color: #ff6b81; font-weight: bold; 
            padding: 8px 20px; border-radius: 20px; 
            background: #fff0f2; transition: all 0.2s; border: 1px solid #ffb6c1;
        }
        .nav-btn:hover { background: #ffb6c1; color: white; transform: translateY(-2px); }
        .nav-btn.active { background: #ff6b81; color: white; border-color: #ff6b81; box-shadow: 0 4px 8px rgba(255,107,129,0.3); }
        
    </style>
    
</head>
<body>

<div class="card">

    <div class="nav-menu">
        <a href="index.html" class="nav-btn active">🏠 莉莉主页</a>
        <a href="gallery.html" class="nav-btn">📷 秘密相册</a>
    <div class="layout-container">

    
    <div class="layout-container">
        
        <div class="left-panel">
            <div class="avatar-container">
                <img src="LilyMouse.png" alt="小猫莉莉" class="avatar" id="lily-img">
                <div class="zzz">Zzz...</div>
            </div>
            <div id="status-tag"><span style="background:#ffb6c1; color:white; padding:4px 15px; border-radius:20px; font-size:0.8rem; font-weight:bold;">LV.3 特级拆家大師</span></div>
            <h1>莉莉 (Lily)</h1>
            
            <div class="rpg-stats">
                <div class="rpg-item">
                    <div class="rpg-info"><span>✨ 卖萌术</span><span>100%</span></div>
                    <div class="rpg-bar-bg"><div class="rpg-bar-fill" style="width: 100%;"></div></div>
                </div>
                <div class="rpg-item">
                    <div class="rpg-info"><span>🦜 和乌鸦吵架</span><span>40%</span></div>
                    <div class="rpg-bar-bg"><div class="rpg-bar-fill" style="width: 40%;"></div></div>
                </div>
                <div class="rpg-item">
                    <div class="rpg-info"><span>🏃 跑酷</span><span>85%</span></div>
                    <div class="rpg-bar-bg"><div class="rpg-bar-fill" style="width: 85%;"></div></div>
                </div>
                <div class="rpg-item">
                    <div class="rpg-info"><span>🧠 听懂人话</span><span>0%</span></div>
                    <div class="rpg-bar-bg"><div class="rpg-bar-fill" style="width: 0%;"></div></div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <h2>📊 实时状态检测器</h2>
            
            <div class="live-stats">
                <div class="stat-item"><small>❤️ 心情值</small><div class="stat-bar-bg"><div id="bar-mood" class="stat-bar-fill" style="width: 80%;"></div></div></div>
                <div class="stat-item"><small>🍗 饥饿值</small><div class="stat-bar-bg"><div id="bar-hunger" class="stat-bar-fill" style="width: 50%;"></div></div></div>
                <div class="stat-item"><small>⚡ 体力值</small><div class="stat-bar-bg"><div id="bar-energy" class="stat-bar-fill" style="width: 100%;"></div></div></div>
                <div class="stat-item"><small>✨ 清洁值</small><div class="stat-bar-bg"><div id="bar-clean" class="stat-bar-fill" style="width: 90%;"></div></div></div>
            </div>

            <div id="message">🐈 莉莉正在等你陪她玩呢！喵~</div>

            <div class="actions">
                <button onclick="interact('feed')" id="feed-btn">🥫 喂罐头</button>
                <button onclick="interact('brush')" id="brush-btn">🪮 刷刷毛</button>
                <button onclick="interact('play')" id="play-btn">🧶 玩玩具</button>
                <button onclick="interact('sleep')" id="sleep-btn">😴 去睡觉</button>
            </div>
        </div>

    </div>
</div>

<script>
    // 初始养成数据
    let stats = { mood: 80, hunger: 50, clean: 90, energy: 100 };
    let isSleeping = false;

    // 状态更新 UI 界面
    function updateUI() {
        document.getElementById('bar-mood').style.width = stats.mood + '%';
        document.getElementById('bar-hunger').style.width = stats.hunger + '%';
        document.getElementById('bar-energy').style.width = stats.energy + '%';
        document.getElementById('bar-clean').style.width = stats.clean + '%';

        // 检查体力是否耗尽
        if (stats.energy <= 0 && !isSleeping) {
            startSleeping("莉莉体力耗尽，不得不去睡觉了...");
        }

        // 按钮禁用状态控制（睡觉时不能喂、刷、玩）
        const actionBtns = ['feed-btn', 'brush-btn', 'play-btn'];
        actionBtns.forEach(id => document.getElementById(id).disabled = isSleeping);
    }

    // 修复后的、干净的互动处理函数
    function interact(type) {
        const msg = document.getElementById('message');
        const img = document.getElementById('lily-img'); 
        
        if (isSleeping && type !== 'sleep') return; // 如果在睡觉且不是点的睡觉按钮，则不响应

        img.style.transform = ''; 

        if (type === 'feed') {
            stats.mood = Math.min(100, stats.mood + 10);
            stats.hunger = Math.min(100, stats.hunger + 30); 
            msg.innerText = "🥫 莉莉吃得满脸都是罐头渍，喵~";
            img.style.transform = 'scale(1.1)'; 
        } else if (type === 'brush') {
            stats.mood = Math.min(100, stats.mood + 15);
            stats.clean = Math.min(100, stats.clean + 20); 
            msg.innerText = "🪮 呼噜呼噜...刷毛真舒服，毛发蓬松！";
        } else if (type === 'play') {
            if (stats.energy >= 25) {
                stats.energy -= 25; 
                stats.mood = Math.min(100, stats.mood + 20); 
                stats.hunger = Math.min(100, stats.hunger - 10); 
                msg.innerText = "🧶 莉莉疯狂捕捉毛线球，展示猫科魅力！";
                img.style.transform = 'rotate(-10deg)'; 
            } else {
                msg.innerText = "💦 莉莉太累了，完全玩不动了。";
            }
        } else if (type === 'sleep') {
            if (!isSleeping) {
                startSleeping("🌙 莉莉正在做梦中，请勿打扰...");
            } else {
                isSleeping = false;
                stats.energy = 100; 
                stats.hunger = Math.max(0, stats.hunger - 10); 
                
                img.src = 'LilyMouse.png'; 
                img.classList.remove('sleeping'); 
                
                document.getElementById('sleep-btn').innerText = "😴 去睡觉";
                document.getElementById('sleep-btn').style.background = "#a1c4fd";
                msg.innerText = "☀️ 莉莉伸个大大的懒腰醒了！";
            }
        }
        updateUI();
        setTimeout(() => { if(!isSleeping) img.style.transform = ''; }, 300);
    }

    // 修复后的睡觉逻辑函数
    function startSleeping(text) {
        isSleeping = true;
        const img = document.getElementById('lily-img'); 
        
        img.src = 'LilySleeping.png'; 
        img.classList.add('sleeping'); 
        
        document.getElementById('sleep-btn').innerText = "⏰ 唤醒莉莉";
        document.getElementById('sleep-btn').style.background = "#4a90e2";
        document.getElementById('message').innerText = text;
    }

    // 网页加载时初始化界面
    updateUI();
</script>

</body>
</html>
