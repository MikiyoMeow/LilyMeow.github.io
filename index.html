<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>莉莉的个猫主页 🐾</title>
    <style>
        /* ======================== 
           1. 基础布局与配色
           ======================== */
        body { 
            font-family: 'Segoe UI', 'PingFang SC', sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: linear-gradient(135deg, #fff5f5 0%, #ffe3e3 100%); 
            color: #4a4a4a;
            padding: 20px;
        }

        /* ======================== 
           语言栏
           ======================== */
        .lang-bar {
            width: 850px;
            max-width: 95vw;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 12px;
        }
        .lang-btn {
            text-decoration: none;
            color: #aaa;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid #ffe3e3;
            background: white;
            transition: all 0.2s;
        }
        .lang-btn:hover { color: #ff6b81; border-color: #ffb6c1; transform: translateY(-2px); }
        .lang-btn.active { background: #ffe3e3; color: #ff6b81; border-color: #ffb6c1; font-weight: bold; }

        /* ======================== 
           导航栏
           ======================== */
        .top-nav {
            display: flex; 
            justify-content: center;
            gap: 20px; 
            margin-bottom: 25px; 
            width: 100%;
        }
        .nav-btn {
            text-decoration: none; 
            color: #ff6b81; 
            font-weight: bold; 
            padding: 10px 25px; 
            border-radius: 25px; 
            background: white; 
            transition: all 0.2s; 
            border: 2px solid #ffb6c1;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.3);
        }
        .nav-btn:hover { background: #fff0f2; transform: translateY(-3px); }
        .nav-btn.active { background: #ff6b81; color: white; border-color: #ff6b81; box-shadow: 0 6px 15px rgba(255,107,129,0.4); }

        /* ======================== 
           主卡片
           ======================== */
        .card { 
            background: white; width: 850px; max-width: 95vw; padding: 2.5rem; 
            border-radius: 30px; box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4); 
            border: 2px solid #ffb6c1;
        }
        .layout-container { display: flex; gap: 30px; align-items: stretch; }
        .left-panel { flex: 3; display: flex; flex-direction: column; align-items: center; border-right: 2px dashed #ffe3e3; padding-right: 25px; }
        .right-panel { flex: 7; display: flex; flex-direction: column; justify-content: center; padding-left: 10px; }

        /* ======================== 
           头像区域
           ======================== */
        .avatar-container { position: relative; display: inline-block; margin-bottom: 8px; }
        .avatar { width: 130px; height: 130px; border-radius: 50%; border: 5px solid #ffb6c1; object-fit: cover; transition: all 0.5s ease; }
        .sleeping-img { filter: grayscale(0.6) opacity(0.7); transform: scale(0.95) rotate(5deg); }
        .zzz { position: absolute; top: -5px; right: -5px; font-size: 1.3rem; color: #8ab4f8; display: none; animation: zzz-fade 1.5s infinite; }
        .zzz.show { display: block; }
        @keyframes zzz-fade { 0%, 100% { opacity: 0; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-8px); } }

        /* 危机光圈 */
        .avatar.crisis { border-color: #ff4757; animation: crisis-pulse 1s infinite; }
        @keyframes crisis-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.4); } 50% { box-shadow: 0 0 0 8px rgba(255,71,87,0); } }

        /* 头衔 + XP 区域 */
        .level-area { width: 100%; text-align: center; margin: 6px 0; }
        #status-tag span { 
            background: #ffb6c1; color: white; padding: 4px 12px; 
            border-radius: 20px; font-size: 0.75rem; font-weight: bold; 
            transition: all 0.3s;
        }

        /* XP 条 */
        .xp-bar-container { width: 100%; margin-top: 8px; }
        .xp-bar-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: #aaa; margin-bottom: 3px; }
        .xp-bar-bg { background: #f0f0f0; height: 6px; border-radius: 3px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, #f6d365, #fda085); border-radius: 3px; transition: width 0.6s ease-out; }

        h1 { font-size: 1.5rem; color: #ff6b81; margin: 6px 0 4px 0; text-align: center; }
        h2 { font-size: 1.3rem; color: #ff6b81; margin: 0 0 15px 0; border-bottom: 2px solid #fff0f2; padding-bottom: 10px; }

        /* ======================== 
           实时状态条
           ======================== */
        .live-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-item { background: #fffafb; padding: 10px 12px; border-radius: 12px; border: 1px solid #fff0f2; }
        .stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .stat-item small { font-weight: bold; font-size: 0.88rem; color: #666; }
        .stat-value { font-size: 0.75rem; color: #aaa; }
        .stat-bar-bg { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        .stat-bar-fill { height: 100%; transition: width 0.5s ease-out, background 0.5s; border-radius: 5px; }
        #bar-mood    { background: linear-gradient(90deg, #ff9a9e, #ff6b81); }
        #bar-hunger  { background: linear-gradient(90deg, #f6d365, #fda085); }
        #bar-energy  { background: linear-gradient(90deg, #84fab0, #8fd3f4); }
        #bar-clean   { background: linear-gradient(90deg, #a1c4fd, #c2e9fb); }
        /* 危机时变色 */
        .stat-bar-fill.low { background: linear-gradient(90deg, #ff4757, #ff6b81) !important; }

        /* ======================== 
           消息框
           ======================== */
        #message { 
            background: #fff0f2; padding: 12px 15px; border-radius: 15px; 
            color: #ff6b81; font-weight: bold; font-size: 1rem; 
            margin-bottom: 15px; text-align: center; border: 1px dashed #ffb6c1;
            min-height: 44px; line-height: 1.5;
            transition: all 0.3s;
        }
        #message.crisis-msg { background: #fff0f0; border-color: #ff4757; color: #ff4757; }
        #message.event-msg  { background: #fffbe6; border-color: #ffd43b; color: #e67e00; }

        /* ======================== 
           随机事件 Toast
           ======================== */
        #event-toast {
            position: fixed; top: 20px; right: 20px;
            background: white; border: 2px solid #ffd43b; border-radius: 15px;
            padding: 12px 18px; max-width: 280px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            font-size: 0.88rem; color: #555; font-weight: bold;
            opacity: 0; transform: translateX(120%);
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 999;
        }
        #event-toast.show { opacity: 1; transform: translateX(0); }

        /* ======================== 
           操作按钮（带冷却）
           ======================== */
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .action-btn-wrap { position: relative; }
        
        button { 
            width: 100%; padding: 11px 5px; border: none; border-radius: 15px; 
            background: #ffb6c1; color: white; cursor: pointer; font-weight: bold; 
            transition: all 0.2s; font-size: 0.9rem; position: relative; overflow: hidden;
        }
        button:hover:not(:disabled) { background: #ff6b81; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(255,107,129,0.3); }
        button:disabled { background: #ddd; cursor: not-allowed; opacity: 0.8; transform: none; box-shadow: none; }
        
        #sleep-btn  { background: #a1c4fd; }
        #sleep-btn:hover:not(:disabled) { background: #4a90e2; }
        #treat-btn  { background: linear-gradient(135deg, #f6d365, #fda085); }
        #treat-btn:hover:not(:disabled) { background: linear-gradient(135deg, #f0c040, #f08060); }

        /* 冷却进度遮罩 */
        .cooldown-overlay {
            position: absolute; top: 0; left: 0; height: 100%;
            background: rgba(0,0,0,0.2); border-radius: 15px;
            pointer-events: none; transition: width 0.1s linear;
        }
        .cooldown-label {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 0.75rem; font-weight: bold; color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5); pointer-events: none;
            white-space: nowrap;
        }

        /* 睡觉按钮单独一行 */
        .sleep-row { margin-top: 0; }
        #sleep-btn { padding: 10px; border-radius: 15px; width: 100%; }

        /* ======================== 
           羁绊值 & 昼夜提示
           ======================== */
        .meta-row { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; color: #bbb; margin-top: 8px;
            padding-top: 8px; border-top: 1px dashed #f0f0f0;
        }
        .bond-display { font-weight: bold; color: #ff9a9e; }
        #time-hint { font-style: italic; }

        /* ======================== 
           RPG 技能栏（左侧，保留原样）
           ======================== */
        .rpg-stats { width: 100%; margin-top: 15px; }
        .rpg-item { margin-bottom: 12px; }
        .rpg-info { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.82rem; margin-bottom: 5px; color: #777; }
        .rpg-bar-bg { background: #eee; height: 7px; border-radius: 4px; overflow: hidden; border: 1px solid #e8e8e8; }
        .rpg-bar-fill { height: 100%; background: linear-gradient(90deg, #ff9a9e 0%, #ff6b81 100%); border-radius: 4px; }
    </style>
</head>
<body>

<div class="lang-bar">
    <a href="index.html" class="lang-btn active">中文</a>
    <a href="index_en.html" class="lang-btn">EN</a>
    <a href="index_ja.html" class="lang-btn">日本語</a>
</div>

<div class="top-nav">
    <a href="index.html" class="nav-btn active">🏠 莉莉主页</a>
    <a href="gallery.html" class="nav-btn">📷 秘密相册</a>
</div>

<div class="card">
    <div class="layout-container">

        <!-- ====== 左侧面板 ====== -->
        <div class="left-panel">
            <div class="avatar-container">
                <img src="LilyMouse.png" alt="小猫莉莉" class="avatar" id="lily-img">
                <div class="zzz" id="zzz-icon">Zzz...</div>
            </div>

            <div class="level-area">
                <div id="status-tag"><span id="level-title">LV.1 新晋小主子</span></div>
                <div class="xp-bar-container">
                    <div class="xp-bar-label">
                        <span>✨ 经验值</span>
                        <span id="xp-text">0 / 30</span>
                    </div>
                    <div class="xp-bar-bg">
                        <div class="xp-bar-fill" id="xp-bar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <h1>莉莉 (Lily)</h1>

            <div class="rpg-stats">
                <div class="rpg-item">
                    <div class="rpg-info"><span>✨ 卖萌术</span><span>100%</span></div>
                    <div class="rpg-bar-bg"><div class="rpg-bar-fill" style="width:100%;"></div></div>
                </div>
                <div class="rpg-item">
                    <div class="rpg-info"><span>🦜 和乌鸦吵架</span><span>20%</span></div>
                    <div class="rpg-bar-bg"><div class="rpg-bar-fill" style="width:20%;"></div></div>
                </div>
                <div class="rpg-item">
                    <div class="rpg-info"><span>🏃 跑酷</span><span>85%</span></div>
                    <div class="rpg-bar-bg"><div class="rpg-bar-fill" style="width:85%;"></div></div>
                </div>
                <div class="rpg-item">
                    <div class="rpg-info"><span>🧠 听懂人话</span><span>0%</span></div>
                    <div class="rpg-bar-bg"><div class="rpg-bar-fill" style="width:0%;"></div></div>
                </div>

        <!-- ====== 右侧面板 ====== -->
        <div class="right-panel">

            <div class="live-stats">

                    <div class="stat-bar-bg"><div id="bar-clean" class="stat-bar-fill" style="width:90%;"></div></div>
                </div>

            <div id="message">🐈 莉莉正在等你陪她玩呢！喵~</div>

            <div class="actions">
                <div class="action-btn-wrap">
                    <button id="feed-btn"  onclick="interact('feed')">🥫 喂罐头</button>

                <div class="action-btn-wrap">

            <div class="meta-row">
                <span class="bond-display">💕 羁绊值：<span id="bond-count">0</span> 次互动</span>

    </div>

<!-- 随机事件弹出 -->
<div id="event-toast">🎲 <span id="event-text"></span></div>

<script>
// =============================================
//  常量定义
// =============================================
const LEVELS = [
    { xp: 0,   title: 'LV.1 新晋小主子',    color: '#ffb6c1' },
    { xp: 30,  title: 'LV.2 撒娇大师',      color: '#ff9a9e' },
    { xp: 80,  title: 'LV.3 特级拆家大师',  color: '#ff7675' },
    { xp: 200, title: 'LV.4 传奇捣蛋王',    color: '#fd79a8' },
    { xp: 400, title: 'LV.5 至尊猫皇',      color: '#e84393' },
];

const COOLDOWN_CONFIG = {
    feed:  { duration: 30,  xp: 3  },
    brush: { duration: 45,  xp: 5  },
    play:  { duration: 20,  xp: 8  },
    treat: { duration: 120, xp: 12 },
};

// 衰减速率（每秒）
const DECAY = {
    hunger: 1 / 60,   // 100 分钟耗尽
    energy: 1 / 120,  // 200 分钟耗尽（睡眠中恢复）
    clean:  1 / 180,  // 300 分钟耗尽
    mood:   1 / 90,   // 正常衰减；饥饿时加倍
};

const RANDOM_EVENTS = [
    { text: '莉莉突然跳上桌子打翻了水杯！', effects: { clean: -8 }, emoji: '💦' },
    { text: '莉莉展示了完美的甩尾！心情大好~', effects: { mood: +15, xp: 5 }, emoji: '✨' },
    { text: '莉莉偷偷吃了零食！', effects: { hunger: +12 }, emoji: '🍗' },
    { text: '莉莉追了一只虫子20分钟...', effects: { energy: -12, mood: +10, xp: 3 }, emoji: '🐛' },
    { text: '莉莉蹭了蹭你的腿，好温柔~', effects: { mood: +20, xp: 5 }, emoji: '💕' },
    { text: '莉莉在你的键盘上踩了一排字！', effects: { mood: +8, xp: 2 }, emoji: '⌨️' },
    { text: '莉莉对着镜子叫了五分钟..', effects: { energy: -5 }, emoji: '🪞' },
    { text: '莉莉叼来了一只玩具老鼠！', effects: { mood: +12, xp: 4 }, emoji: '🐭' },
    { text: '莉莉整理了自己的毛发', effects: { clean: +10 }, emoji: '🧹' },
];

// =============================================
//  状态管理
// =============================================
function defaultState() {
    return {
        mood: 80, hunger: 70, energy: 100, clean: 90,
        xp: 0, bond: 0,
        isSleeping: false,
        lastSave: Date.now(),
        cooldownEnd: { feed: 0, brush: 0, play: 0, treat: 0 },
    };
}

function loadState() {
    try {
        const raw = localStorage.getItem('lily_v2');
        if (!raw) return defaultState();
        const s = JSON.parse(raw);
        // 离线时间补算
        const elapsed = (Date.now() - (s.lastSave || Date.now())) / 1000;
        applyDecay(s, elapsed);
        return s;
    } catch(e) { return defaultState(); }
}

function applyDecay(s, seconds) {
    if (s.isSleeping) {
        // 睡眠中：体力每秒回复 1/30（约30分钟满血），微量消耗饥饿
        s.energy  = Math.min(100, (s.energy  || 0) + seconds * (1/30));
        s.hunger  = Math.max(0,   (s.hunger  || 0) - seconds * DECAY.hunger * 0.3);
        if (s.energy >= 100) s.isSleeping = false; // 精力充沛自动醒来
    } else {
        const isNight = isNightTime();
        const hungerDecay = DECAY.hunger * (isNight ? 0.8 : 1);
        const energyDecay = DECAY.energy * (isNight ? 1.5 : 1); // 晚上更累
        const moodDecay   = s.hunger < 20 ? DECAY.mood * 2 : DECAY.mood;

        s.hunger = Math.max(0, (s.hunger || 0) - seconds * hungerDecay);
        s.energy = Math.max(0, (s.energy || 0) - seconds * energyDecay);
        s.clean  = Math.max(0, (s.clean  || 0) - seconds * DECAY.clean);
        s.mood   = Math.max(0, (s.mood   || 0) - seconds * moodDecay);
    }
    // 体力归零 → 强制睡觉
    if (s.energy <= 0 && !s.isSleeping) {
        s.isSleeping = true;
        s.energy = 0;
    }
}

function saveState() {
    state.lastSave = Date.now();
    state.isSleeping = isSleeping;
    localStorage.setItem('lily_v2', JSON.stringify(state));
}

function isNightTime() {
    const h = new Date().getHours();
    return h >= 22 || h < 6;
}

// =============================================
//  初始化
// =============================================
let state = loadState();
let isSleeping = state.isSleeping || false;
let lastTick = Date.now();
let nextEventTime = Date.now() + randomBetween(120000, 300000);

if (isSleeping) activateSleep(false);
updateAllUI();

// =============================================
//  游戏主循环（每秒 tick）
// =============================================
setInterval(() => {
    const now = Date.now();
    const delta = (now - lastTick) / 1000;
    lastTick = now;

    applyDecay(state, delta);
    updateAllUI();
    saveState();

    // 随机事件检查
    if (!isSleeping && now >= nextEventTime) {
        triggerRandomEvent();
        nextEventTime = now + randomBetween(120000, 300000);
    }
}, 1000);

// =============================================
//  交互逻辑
// =============================================
function interact(type) {
    if (isSleeping && type !== 'sleep') return;
    const now = Date.now();

    if (type !== 'sleep') {
        const cfg = COOLDOWN_CONFIG[type];
        if (state.cooldownEnd[type] && now < state.cooldownEnd[type]) return; // 冷却中
        state.cooldownEnd[type] = now + cfg.duration * 1000;
        gainXP(cfg.xp);
        state.bond++;
    }

    const img = document.getElementById('lily-img');
    const msg = document.getElementById('message');
    msg.className = '';

    if (type === 'feed') {
        state.hunger = Math.min(100, state.hunger + 30);
        state.mood   = Math.min(100, state.mood   + 5);
        setMessage('🥫 莉莉吃得满脸都是罐头渍，喵~');
        animateImg(img, 'scale(1.12)');
    } else if (type === 'brush') {
        state.clean = Math.min(100, state.clean + 25);
        state.mood  = Math.min(100, state.mood  + 15);
        setMessage('🪮 呼噜呼噜...刷毛真舒服，毛发蓬松！');
        animateImg(img, 'scale(1.05) rotate(3deg)');
    } else if (type === 'play') {
        if (state.energy < 20) {
            setMessage('💦 莉莉太累了，完全玩不动……'); return;
        }
        state.energy = Math.max(0, state.energy - 22);
        state.mood   = Math.min(100, state.mood   + 25);
        state.hunger = Math.max(0, state.hunger - 10);
        setMessage('🧶 莉莉疯狂捕捉毛线球，展示猫科魅力！');
        animateImg(img, 'rotate(-12deg)');
    } else if (type === 'treat') {
        state.mood   = Math.min(100, state.mood   + 40);
        state.hunger = Math.min(100, state.hunger + 10);
        setMessage('🍣 天哪！莉莉幸福得眯起了眼睛！！');
        animateImg(img, 'scale(1.2)');
    } else if (type === 'sleep') {
        if (!isSleeping) {
            isSleeping = true;
            state.isSleeping = true;
            activateSleep(true);
            setMessage('🌙 莉莉正在甜甜地做梦，请勿打扰...');
        } else {
            isSleeping = false;
            state.isSleeping = false;
            deactivateSleep();
            state.energy = Math.min(100, state.energy + 30); // 手动唤醒补一点体力
            state.hunger = Math.max(0, state.hunger - 8);
            setMessage('☀️ 莉莉伸了个大大的懒腰，精神抖擞！');
        }
    }

    updateAllUI();
    saveState();
}

function gainXP(amount) {
    const oldLevel = getCurrentLevel();
    state.xp = (state.xp || 0) + amount;
    const newLevel = getCurrentLevel();
    if (newLevel > oldLevel) {
        setTimeout(() => showToast(`🎉 莉莉升级了！${LEVELS[newLevel].title}`, true), 400);
    }
}

// =============================================
//  睡眠激活/关闭
// =============================================
function activateSleep(animate) {
    const img = document.getElementById('lily-img');
    if (animate) img.classList.add('sleeping-img');
    img.src = 'LilySleeping.png';
    document.getElementById('zzz-icon').classList.add('show');
    const btn = document.getElementById('sleep-btn');
    btn.innerText = '⏰ 唤醒莉莉';
    btn.style.background = '#4a90e2';
    disableActionBtns(true);
}

function deactivateSleep() {
    const img = document.getElementById('lily-img');
    img.src = 'LilyMouse.png';
    img.classList.remove('sleeping-img');
    document.getElementById('zzz-icon').classList.remove('show');
    const btn = document.getElementById('sleep-btn');
    btn.innerText = '😴 去睡觉';
    btn.style.background = '#a1c4fd';
    disableActionBtns(false);
}

function disableActionBtns(disabled) {
    ['feed-btn','brush-btn','play-btn','treat-btn'].forEach(id => {
        document.getElementById(id).disabled = disabled;
    });
}

// =============================================
//  全量 UI 更新
// =============================================
function updateAllUI() {
    // 状态条
    const vals = { mood: state.mood, hunger: state.hunger, energy: state.energy, clean: state.clean };
    for (const [key, val] of Object.entries(vals)) {
        const pct = Math.round(Math.max(0, Math.min(100, val)));
        document.getElementById(`bar-${key}`).style.width  = pct + '%';
        document.getElementById(`val-${key}`).innerText    = pct;
        // 低于 20 时变红警告
        document.getElementById(`bar-${key}`).classList.toggle('low', pct < 20);
    }

    // 头像危机光圈
    const img = document.getElementById('lily-img');
    const inCrisis = state.mood < 20 || state.hunger < 20;
    img.classList.toggle('crisis', inCrisis && !isSleeping);

    // 自动检测体力归零
    if (!isSleeping && state.energy <= 0) {
        isSleeping = true; state.isSleeping = true;
        activateSleep(true);
        setMessage('😴 莉莉体力耗尽，自己跑去睡觉了...');
    }
    // 自动检测睡眠满体力（若在睡觉中且体力满）
    if (isSleeping && state.energy >= 100) {
        isSleeping = false; state.isSleeping = false;
        deactivateSleep();
        setMessage('☀️ 莉莉精力充沛，自己醒过来啦！');
    }

    // 危机消息覆盖（只在非睡眠且无冷却消息时）
    if (!isSleeping) updateCrisisMessage();

    // XP / 等级
    updateLevelUI();

    // 羁绊值
    document.getElementById('bond-count').innerText = state.bond || 0;

    // 冷却按钮
    updateCooldowns();

    // 昼夜提示
    const isNight = isNightTime();
    document.getElementById('time-hint').innerText = isNight ? '🌙 深夜，莉莉更容易困' : '🌞 白天';
}

function updateLevelUI() {
    const lvlIdx = getCurrentLevel();
    const lvl    = LEVELS[lvlIdx];
    const next   = LEVELS[lvlIdx + 1];
    document.getElementById('level-title').innerText        = lvl.title;
    document.getElementById('level-title').parentElement.style.background = lvl.color;

    const xpInLevel  = state.xp - lvl.xp;
    const xpNeeded   = next ? next.xp - lvl.xp : Infinity;
    const pct        = next ? Math.min(100, (xpInLevel / xpNeeded) * 100) : 100;
    document.getElementById('xp-bar').style.width  = pct + '%';
    document.getElementById('xp-text').innerText   = next
        ? `${Math.round(state.xp)} / ${next.xp}`
        : `MAX (${Math.round(state.xp)})`;
}

function getCurrentLevel() {
    let lvl = 0;
    for (let i = 0; i < LEVELS.length; i++) {
        if ((state.xp || 0) >= LEVELS[i].xp) lvl = i;
    }
    return lvl;
}

let crisisShown = false;
function updateCrisisMessage() {
    const msg = document.getElementById('message');
    if (state.hunger < 20 && !crisisShown) {
        setMessage('😿 莉莉肚子好饿，快去喂她！', 'crisis');
        crisisShown = true;
    } else if (state.mood < 20 && !crisisShown) {
        setMessage('😾 莉莉心情极差，需要安慰！', 'crisis');
        crisisShown = true;
    } else if (state.hunger >= 20 && state.mood >= 20) {
        crisisShown = false;
    }
}

// =============================================
//  冷却 UI
// =============================================
function updateCooldowns() {
    const now = Date.now();
    for (const type of ['feed','brush','play','treat']) {
        const endTime = state.cooldownEnd?.[type] || 0;
        const cfg = COOLDOWN_CONFIG[type];
        const btn = document.getElementById(`${type}-btn`);
        const overlay = document.getElementById(`cd-${type}`);
        const label   = document.getElementById(`cdlabel-${type}`);

        if (now < endTime && !isSleeping) {
            const remaining = (endTime - now) / 1000;
            const pct = (remaining / cfg.duration) * 100;
            overlay.style.width  = pct + '%';
            label.innerText = `${Math.ceil(remaining)}s`;
            btn.disabled = true;
        } else {
            overlay.style.width = '0%';
            label.innerText = '';
            if (!isSleeping) btn.disabled = false;
        }
    }
}

// =============================================
//  随机事件
// =============================================
function triggerRandomEvent() {
    const ev = RANDOM_EVENTS[Math.floor(Math.random() * RANDOM_EVENTS.length)];
    // 应用效果
    for (const [key, val] of Object.entries(ev.effects || {})) {
        if (key === 'xp') gainXP(val);
        else state[key] = Math.max(0, Math.min(100, (state[key] || 0) + val));
    }
    showToast(ev.emoji + ' ' + ev.text);
    setMessage('🎲 随机事件发生！' + ev.text, 'event');
}

function showToast(text, isLevelUp = false) {
    const toast = document.getElementById('event-toast');
    document.getElementById('event-text').innerText = text;
    toast.style.borderColor = isLevelUp ? '#ff6b81' : '#ffd43b';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
}

// =============================================
//  工具函数
// =============================================
let msgTimeout = null;
function setMessage(text, cls = '') {
    const msg = document.getElementById('message');
    msg.innerText = text;
    msg.className = cls ? cls + '-msg' : '';
}

function animateImg(img, transform) {
    img.style.transform = transform;
    setTimeout(() => { img.style.transform = ''; }, 350);
}

function randomBetween(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

</script>
