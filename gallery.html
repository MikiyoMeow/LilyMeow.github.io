<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>莉莉的秘密相册 📷</title>
    <style>
        /* 保持原有的优美样式 */
        body { font-family: 'Segoe UI', 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; background: linear-gradient(135deg, #fff5f5 0%, #ffe3e3 100%); color: #4a4a4a; }
        .top-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; width: 100%; }
        .nav-btn { text-decoration: none; color: #ff6b81; font-weight: bold; padding: 10px 25px; border-radius: 25px; background: white; transition: all 0.2s; border: 2px solid #ffb6c1; box-shadow: 0 4px 10px rgba(255, 182, 193, 0.3); }
        .nav-btn:hover { background: #fff0f2; transform: translateY(-3px); }
        .nav-btn.active { background: #ff6b81; color: white; border-color: #ff6b81; box-shadow: 0 6px 15px rgba(255,107,129,0.4); }
        .card { background: white; width: 850px; max-width: 95vw; padding: 2.5rem; border-radius: 30px; box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4); text-align: center; border: 2px solid #ffb6c1; margin-bottom: 30px; }
        h2 { font-size: 1.5rem; color: #ff6b81; margin: 0 0 20px 0; border-bottom: 2px dashed #fff0f2; padding-bottom: 10px; }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .photo-box { background: #fffafb; padding: 15px; border-radius: 15px; border: 1px solid #fff0f2; transition: transform 0.3s; }
        .photo-box:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(255,182,193,0.2); }
        .photo-box img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .photo-desc { color: #666; font-size: 0.95rem; margin: 10px 0; font-weight: bold; }
        
        /* 联机评论区外框样式 */
        .giscus-container { background: #fffafb; padding: 20px; border-radius: 20px; border: 1px solid #ffe3e3; margin-top: 20px; }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="index.html" class="nav-btn">🏠 莉莉主页</a>
    <a href="gallery.html" class="nav-btn active">📷 秘密相册</a>
</div>

<div class="card">
    <h2>📸 莉莉的高清黑历史特辑</h2>

    <div class="photo-grid">
        <div class="photo-box">
            <img src="LilyMouse.png" alt="莉莉清醒">
            <p class="photo-desc">看我的大眼睛</p>
        </div>
        <div class="photo-box">
            <img src="LilySleeping.png" alt="莉莉睡觉">
            <p class="photo-desc">梦见吃小鱼干...</p>
        </div>
        <div class="photo-box" style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f9f9f9; border: 2px dashed #eee;">
            <p style="color:#aaa;">+ 期待新照片</p>
        </div>
    </div>

    <div class="giscus-container">
        <p style="color:#aaa; text-align:center;">请将 Giscus 代码粘贴在此处</p>
        <script src="https://giscus.app/client.js"
            data-repo="mikiyomeow/Lily"
            data-repo-id="R_kgDORvO5WA"
            data-category="General"
            data-category-id="DIC_kwDORvO5WM4C5O2b"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="bottom"
            data-theme="preferred_color_scheme"
            data-lang="zh-CN"
            crossorigin="anonymous"
            async>
        </script>
        
    </div>
</div>

</body>
</html>
