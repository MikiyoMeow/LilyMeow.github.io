<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>莉莉的秘密相册 📷</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; margin: 0; padding-top: 50px;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe3e3 100%); 
        }
        .card { 
            background: white; width: 850px; padding: 2.5rem; 
            border-radius: 30px; box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4); 
            text-align: center; border: 2px solid #ffb6c1;
        }
        
        /* 导航菜单（保持和主页一致，但激活状态变了） */
        .nav-menu { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px dashed #ffe3e3; }
        .nav-btn { text-decoration: none; color: #ff6b81; font-weight: bold; padding: 8px 20px; border-radius: 20px; background: #fff0f2; transition: all 0.2s; border: 1px solid #ffb6c1; }
        .nav-btn:hover { background: #ffb6c1; color: white; transform: translateY(-2px); }
        .nav-btn.active { background: #ff6b81; color: white; box-shadow: 0 4px 8px rgba(255,107,129,0.3); }

        /* 相册网格布局 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 1行3张图 */
            gap: 20px;
            margin-top: 20px;
        }
        .photo-box {
            background: #fffafb; padding: 10px; border-radius: 15px; border: 1px solid #fff0f2;
        }
        .photo-box img {
            width: 100%; height: 200px; object-fit: cover; border-radius: 10px; transition: 0.3s;
        }
        .photo-box img:hover { transform: scale(1.05); }
        .photo-box p { color: #666; font-size: 0.9rem; margin: 10px 0 0 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="nav-menu">
        <a href="index.html" class="nav-btn">🏠 莉莉主页</a>
        <a href="gallery.html" class="nav-btn active">📷 秘密相册</a>
    </div>

    <h2 style="color:#ff6b81;">莉莉的高清黑历史特辑 📸</h2>

    <div class="photo-grid">
        <div class="photo-box">
            <img src="LilyMouse.png" alt="莉莉清醒">
            <p>鼠鼠我呀~</p>
        </div>
        <div class="photo-box">
            <img src="LilySleeping.png" alt="莉莉睡觉">
            <p>梦见吃小鱼干...</p>
        </div>
        <div class="photo-box" style="display: flex; align-items: center; justify-content: center; background: #f9f9f9;">
            <p style="color:#aaa;">+ 期待新照片</p>
        </div>
    </div>
</div>

</body>
</html>
