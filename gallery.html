<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>莉莉的秘密相册 📷</title>
    <style>
        /* ========================
           基础
           ======================== */
        body {
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe3e3 100%);
            color: #4a4a4a;
        }

        /* ========================
           导航栏（与主页一致）
           ======================== */
        .lang-bar {
            width: 850px; max-width: 95vw;
            display: flex; justify-content: flex-end;
            gap: 10px; margin-bottom: 12px;
        }
        .lang-btn {
            text-decoration: none; color: #aaa; font-size: 0.75rem;
            padding: 4px 12px; border-radius: 12px;
            border: 1px solid #ffe3e3; background: white; transition: all 0.2s;
        }
        .lang-btn:hover { color: #ff6b81; border-color: #ffb6c1; transform: translateY(-2px); }
        .lang-btn.active { background: #ffe3e3; color: #ff6b81; border-color: #ffb6c1; font-weight: bold; }

        .top-nav {
            display: flex; justify-content: center;
            gap: 20px; margin-bottom: 25px; width: 100%;
        }
        .nav-btn {
            text-decoration: none; color: #ff6b81; font-weight: bold;
            padding: 10px 25px; border-radius: 25px; background: white;
            transition: all 0.2s; border: 2px solid #ffb6c1;
            box-shadow: 0 4px 10px rgba(255,182,193,0.3);
        }
        .nav-btn:hover { background: #fff0f2; transform: translateY(-3px); }
        .nav-btn.active { background: #ff6b81; color: white; border-color: #ff6b81; box-shadow: 0 6px 15px rgba(255,107,129,0.4); }

        /* ========================
           主卡片
           ======================== */
        .card {
            background: white; width: 850px; max-width: 95vw;
            padding: 2.5rem; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255,182,193,0.4);
            border: 2px solid #ffb6c1; margin-bottom: 30px;
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 2px dashed #fff0f2; padding-bottom: 15px;
            flex-wrap: wrap; gap: 12px;
        }
        h2 { font-size: 1.5rem; color: #ff6b81; margin: 0; }

        /* ========================
           工具栏（筛选 + 随机）
           ======================== */
        .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .tag-filter { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag-btn {
            padding: 5px 14px; border-radius: 20px; border: 1.5px solid #ffb6c1;
            background: white; color: #ff6b81; font-size: 0.8rem; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
        }
        .tag-btn:hover  { background: #fff0f2; transform: translateY(-1px); }
        .tag-btn.active { background: #ff6b81; color: white; border-color: #ff6b81; }

        .random-btn {
            padding: 6px 16px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, #f6d365, #fda085);
            color: white; font-size: 0.8rem; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 3px 8px rgba(253,160,133,0.3);
        }
        .random-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 12px rgba(253,160,133,0.4); }

        /* 照片总数提示 */
        .photo-count { font-size: 0.8rem; color: #bbb; white-space: nowrap; }

        /* ========================
           照片网格
           ======================== */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .photo-box {
            background: #fffafb; border-radius: 16px;
            border: 1.5px solid #fff0f2;
            overflow: hidden; cursor: pointer;
            transition: transform 0.28s, box-shadow 0.28s;
            position: relative;
        }
        .photo-box:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(255,182,193,0.35);
        }
        .photo-box.hidden { display: none; }

        /* 序号角标 */
        .photo-index {
            position: absolute; top: 10px; left: 10px;
            background: rgba(255,107,129,0.85); color: white;
            font-size: 0.7rem; font-weight: bold;
            padding: 2px 8px; border-radius: 10px;
        }

        /* 标签角标 */
        .photo-tag-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.9); color: #ff6b81;
            font-size: 0.68rem; font-weight: bold;
            padding: 2px 8px; border-radius: 10px;
            border: 1px solid #ffb6c1;
        }

        .photo-box img {
            width: 100%; height: 190px; object-fit: cover; display: block;
            transition: transform 0.4s;
        }
        .photo-box:hover img { transform: scale(1.06); }

        .photo-info { padding: 10px 12px 12px; }
        .photo-desc { color: #555; font-size: 0.88rem; font-weight: bold; margin: 0 0 4px 0; }
        .photo-date { color: #bbb; font-size: 0.72rem; }

        /* 悬停时显示"点击查看"提示 */
        .photo-box::after {
            content: '💬 点击查看评论';
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(255,107,129,0.85), transparent);
            color: white; font-size: 0.78rem; font-weight: bold;
            text-align: center; padding: 20px 0 10px;
            opacity: 0; transition: opacity 0.25s;
        }
        .photo-box:hover::after { opacity: 1; }

        /* 占位空格 */
        .photo-placeholder {
            background: #f9f9f9; border-radius: 16px;
            border: 2px dashed #eee;
            display: flex; align-items: center; justify-content: center;
            min-height: 220px; color: #ccc; font-size: 0.88rem; flex-direction: column; gap: 6px;
        }
        .photo-placeholder span { font-size: 1.8rem; }

        /* ========================
           灯箱 Lightbox
           ======================== */
        #lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.72); z-index: 1000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }
        #lightbox.open { display: flex; }

        .lightbox-inner {
            background: white; border-radius: 24px;
            width: min(860px, 95vw); max-height: 92vh;
            overflow-y: auto; display: flex; flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.35);
            position: relative; animation: lb-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes lb-in {
            from { opacity: 0; transform: scale(0.88); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* 关闭按钮 */
        #lb-close {
            position: absolute; top: 14px; right: 16px;
            background: #ffb6c1; border: none; border-radius: 50%;
            width: 32px; height: 32px; font-size: 1rem;
            color: white; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }
        #lb-close:hover { background: #ff6b81; transform: rotate(90deg); }

        /* 上/下一张 箭头 */
        .lb-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: white; border: 2px solid #ffb6c1;
            border-radius: 50%; width: 38px; height: 38px;
            font-size: 1rem; color: #ff6b81; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; box-shadow: 0 4px 10px rgba(255,182,193,0.3);
        }
        .lb-arrow:hover { background: #ff6b81; color: white; }
        #lb-prev { left: 14px; }
        #lb-next { right: 14px; }

        /* 灯箱内容 */
        .lb-image-wrap {
            width: 100%; max-height: 420px; overflow: hidden;
            border-radius: 24px 24px 0 0; background: #f9f9f9;
            display: flex; align-items: center; justify-content: center;
        }
        .lb-image-wrap img {
            width: 100%; max-height: 420px; object-fit: contain;
            transition: opacity 0.2s;
        }
        .lb-image-wrap img.fade { opacity: 0; }

        .lb-meta {
            padding: 16px 24px 6px;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        #lb-title { font-size: 1.1rem; font-weight: bold; color: #ff6b81; margin: 0; }
        #lb-date  { font-size: 0.78rem; color: #bbb; margin: 4px 0 0 0; }
        #lb-counter { font-size: 0.8rem; color: #ccc; white-space: nowrap; padding-top: 4px; }

        /* Giscus 区域 */
        .lb-comments {
            padding: 0 24px 24px;
            border-top: 1px dashed #fff0f2;
            margin-top: 10px;
        }
        .lb-comments-title {
            font-size: 0.85rem; color: #ffb6c1; font-weight: bold;
            margin: 12px 0 10px 0;
        }
        #giscus-mount { min-height: 80px; }

        /* 无结果提示 */
        #no-result {
            display: none; text-align: center;
            padding: 40px; color: #ccc; font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="lang-bar">
    <a href="index.html" class="lang-btn">中文</a>
    <a href="index_en.html" class="lang-btn">EN</a>
    <a href="index_ja.html" class="lang-btn">日本語</a>
</div>

<div class="top-nav">
    <a href="index.html"   class="nav-btn">🏠 莉莉主页</a>
    <a href="gallery.html" class="nav-btn active">📷 秘密相册</a>
</div>

<div class="card">
    <div class="card-header">
        <h2>📸 莉莉的高清黑历史特辑</h2>
        <div class="toolbar">
            <!-- 标签筛选 -->
            <div class="tag-filter" id="tag-filter">
                <button class="tag-btn active" data-tag="all">全部</button>
                <button class="tag-btn" data-tag="睡觉">😴 睡觉</button>
                <button class="tag-btn" data-tag="玩耍">🧶 玩耍</button>
                <button class="tag-btn" data-tag="吃饭">🍗 吃饭</button>
                <button class="tag-btn" data-tag="日常">🐾 日常</button>
            </div>
            <!-- 随机 -->
            <button class="random-btn" onclick="openRandom()">🎲 随机一张</button>
        </div>
    </div>

    <p class="photo-count" id="photo-count">共 <span id="visible-count">2</span> 张照片</p>

    <!-- ===== 照片网格 ===== -->
    <div class="photo-grid" id="photo-grid">
        <!-- 照片数据由 JS 渲染 -->
    </div>

    <div id="no-result">没有找到该标签下的照片 🐾</div>
</div>

<!-- ===== 灯箱 ===== -->
<div id="lightbox">
    <div class="lightbox-inner">
        <button id="lb-close" onclick="closeLightbox()">✕</button>
        <button class="lb-arrow" id="lb-prev" onclick="shiftPhoto(-1)">‹</button>
        <button class="lb-arrow" id="lb-next" onclick="shiftPhoto(+1)">›</button>

        <div class="lb-image-wrap">
            <img id="lb-img" src="" alt="">
        </div>

        <div class="lb-meta">
            <div>
                <p id="lb-title"></p>
                <p id="lb-date"></p>
            </div>
            <span id="lb-counter"></span>
        </div>

        <div class="lb-comments">
            <p class="lb-comments-title">💬 留言 & 点赞</p>
            <div id="giscus-mount"></div>
        </div>
    </div>
</div>

<script>
// =============================================
//  照片数据 —— 在这里添加新照片！
//  每张照片需要：src、desc（描述）、date（日期）、tag（标签）、term（Giscus唯一ID）
// =============================================
const PHOTOS = [
    {
        src:  'LilyMouse.png',
        desc: '鼠鼠我呀~',
        date: '2024-01-15',
        tag:  '日常',
        term: 'photo-lily-mouse',
    },
    {
        src:  'LilySleeping.png',
        desc: '梦见吃小鱼干...',
        date: '2024-02-03',
        tag:  '睡觉',
        term: 'photo-lily-sleeping',
    },
    // ↓ 新增照片示例（取消注释并替换内容即可）
    // {
    //     src:  'LilyEating.png',
    //     desc: '正在认真研究罐头',
    //     date: '2024-03-10',
    //     tag:  '吃饭',
    //     term: 'photo-lily-eating',
    // },
];

// Giscus 配置（与 gallery 原版一致）
const GISCUS_CONFIG = {
    repo:        'mikiyomeow/Lily',
    repoId:      'R_kgDORvO5WA',
    category:    'General',
    categoryId:  'DIC_kwDORvO5WM4C5O2b',
    lang:        'zh-CN',
};

// =============================================
//  渲染网格
// =============================================
let currentFilter = 'all';
let currentIndex  = 0;   // 灯箱当前显示的照片在 PHOTOS 中的下标

function getVisible() {
    return currentFilter === 'all'
        ? PHOTOS
        : PHOTOS.filter(p => p.tag === currentFilter);
}

function renderGrid() {
    const grid     = document.getElementById('photo-grid');
    const visible  = getVisible();
    const noResult = document.getElementById('no-result');

    grid.innerHTML = '';
    noResult.style.display = visible.length ? 'none' : 'block';
    document.getElementById('visible-count').innerText = visible.length;

    visible.forEach((photo, i) => {
        const box = document.createElement('div');
        box.className = 'photo-box';
        box.onclick   = () => openLightbox(PHOTOS.indexOf(photo));
        box.innerHTML = `
            <span class="photo-index">#${i + 1}</span>
            <span class="photo-tag-badge">${photo.tag}</span>
            <img src="${photo.src}" alt="${photo.desc}" loading="lazy">
            <div class="photo-info">
                <p class="photo-desc">${photo.desc}</p>
                <p class="photo-date">📅 ${photo.date}</p>
            </div>
        `;
        grid.appendChild(box);
    });

    // 占位格（保持 3 列美观）
    const remainder = visible.length % 3;
    if (remainder !== 0 && visible.length > 0) {
        const slots = 3 - remainder;
        for (let i = 0; i < slots; i++) {
            const ph = document.createElement('div');
            ph.className = 'photo-placeholder';
            ph.innerHTML = `<span>📷</span><p>期待新照片</p>`;
            grid.appendChild(ph);
        }
    }
    // 如果完全没有照片也给三个占位
    if (visible.length === 0) {
        for (let i = 0; i < 3; i++) {
            const ph = document.createElement('div');
            ph.className = 'photo-placeholder';
            ph.innerHTML = `<span>📷</span><p>期待新照片</p>`;
            grid.appendChild(ph);
        }
    }
}

// =============================================
//  标签筛选
// =============================================
document.getElementById('tag-filter').addEventListener('click', e => {
    const btn = e.target.closest('.tag-btn');
    if (!btn) return;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.tag;
    renderGrid();
});

// =============================================
//  灯箱
// =============================================
function openLightbox(photoIndex) {
    currentIndex = photoIndex;
    showPhotoInLightbox(currentIndex);
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
}

function shiftPhoto(delta) {
    const next = currentIndex + delta;
    if (next < 0 || next >= PHOTOS.length) return;
    const img = document.getElementById('lb-img');
    img.classList.add('fade');
    setTimeout(() => {
        currentIndex = next;
        showPhotoInLightbox(currentIndex);
        img.classList.remove('fade');
    }, 180);
}

function showPhotoInLightbox(idx) {
    const photo = PHOTOS[idx];
    document.getElementById('lb-img').src    = photo.src;
    document.getElementById('lb-title').innerText = photo.desc;
    document.getElementById('lb-date').innerText  = '📅 ' + photo.date + ' · 🏷 ' + photo.tag;
    document.getElementById('lb-counter').innerText = `${idx + 1} / ${PHOTOS.length}`;

    // 箭头显示控制
    document.getElementById('lb-prev').style.display = idx > 0               ? 'flex' : 'none';
    document.getElementById('lb-next').style.display = idx < PHOTOS.length-1 ? 'flex' : 'none';

    // 加载该照片专属的 Giscus
    loadGiscus(photo.term);
}

// =============================================
//  动态加载 Giscus（每张照片独立评论区）
// =============================================
function loadGiscus(term) {
    const mount = document.getElementById('giscus-mount');
    mount.innerHTML = ''; // 清除旧评论区

    const script = document.createElement('script');
    script.src = 'https://giscus.app/client.js';
    script.setAttribute('data-repo',        GISCUS_CONFIG.repo);
    script.setAttribute('data-repo-id',     GISCUS_CONFIG.repoId);
    script.setAttribute('data-category',    GISCUS_CONFIG.category);
    script.setAttribute('data-category-id', GISCUS_CONFIG.categoryId);
    script.setAttribute('data-mapping',     'specific');   // 使用指定 term
    script.setAttribute('data-term',        term);         // ← 每张照片唯一
    script.setAttribute('data-strict',      '0');
    script.setAttribute('data-reactions-enabled', '1');    // 点赞/Emoji 反应
    script.setAttribute('data-emit-metadata',     '0');
    script.setAttribute('data-input-position',    'top');
    script.setAttribute('data-theme',       'preferred_color_scheme');
    script.setAttribute('data-lang',        GISCUS_CONFIG.lang);
    script.setAttribute('crossorigin',      'anonymous');
    script.async = true;
    mount.appendChild(script);
}

// =============================================
//  随机一张
// =============================================
function openRandom() {
    const idx = Math.floor(Math.random() * PHOTOS.length);
    openLightbox(idx);
}

// =============================================
//  键盘导航
// =============================================
document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  shiftPhoto(-1);
    if (e.key === 'ArrowRight') shiftPhoto(+1);
    if (e.key === 'Escape')     closeLightbox();
});

// 点击遮罩关闭
document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// =============================================
//  初始化
// =============================================
renderGrid();
</script>
</body>
</html>
